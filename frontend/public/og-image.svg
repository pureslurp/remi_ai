<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="55%" stop-color="#27272a"/>
      <stop offset="100%" stop-color="#3f3f46"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#3f3f46"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g transform="translate(96 195)" filter="url(#shadow)">
    <rect width="120" height="120" rx="34" fill="url(#mark)" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
    <text
      x="60"
      y="60"
      text-anchor="middle"
      dominant-baseline="central"
      fill="#f4f4f5"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="48"
      font-weight="600"
      letter-spacing="-0.03em"
    >r.</text>
  </g>
  <text
    x="252"
    y="278"
    fill="#fafafa"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="72"
    font-weight="700"
    letter-spacing="-0.03em"
  >reco-pilot</text>
  <text
    x="96"
    y="410"
    fill="#a1a1aa"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="32"
    font-weight="500"
    letter-spacing="-0.01em"
  >AI workspace for real estate agents — client context, email, and docs in one place.</text>
