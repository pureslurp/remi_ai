# Validates builds before merge. Deployments are typically:
# - Vercel: Git-connected project → preview (PR) / production (main) builds
# - Railway: service connected to repo → deploy on push
# - Supabase: Postgres; Alembic migrations run on API boot (see backend/main.py)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        run: |
          npm ci
          npm run build

  backend:
    name: Backend (FastAPI + Alembic)
    runs-on: ubuntu-latest
    env:
      # No Postgres in CI: use SQLite under KOVA_HOME (avoid ~/.kova on the runner).
      DATABASE_URL: ""
      KOVA_HOME: ${{ github.workspace }}/.ci-kova-home
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      # config.load_dotenv(..., override=True) would let a committed .env beat job env.
      - name: Remove workspace .env if present
        run: rm -f "${{ github.workspace }}/.env"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare isolated KOVA_HOME
        run: mkdir -p "$KOVA_HOME"

      - name: Bytecode check
        run: python -m compileall -q .

      - name: Import app (SQLite bootstrap)
        run: python -c "import main; print('import ok')"

      - name: Alembic revision graph
        run: alembic heads

  docker:
    name: Docker (API image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: docker build
        run: docker build -t kova-api:ci .
